<script src="config.js"></script>
<script>
async function initSupabase() {
  if (typeof window.supabase === 'undefined') {
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

let supabaseClient = null;

window.addEventListener('DOMContentLoaded', async () => {
  supabaseClient = await initSupabase();
  console.log('Supabase初期化完了:', supabaseClient);
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';

  if (!supabaseClient) {
    errorEl.textContent = 'システム初期化中です。もう一度お試しください。';
    errorEl.style.display = 'block';
    return;
  }

  if (!email || !password) {
    errorEl.textContent = 'メールアドレスとパスワードを入力してください';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errorEl.textContent = 'エラー: ' + error.message;
      errorEl.style.display = 'block';
      return;
    }
    window.location.href = 'app.html';
  } catch(e) {
    errorEl.textContent = '接続エラー: ' + e.message;
    errorEl.style.display = 'block';
  }
}

function openPasswordResetModal() {
  alert('パスワードリセットについては管理者にお問い合わせください。');
}

function doPasswordReset() {
  const newPw = document.getElementById('reset-new-pw').value;
  const confirmPw = document.getElementById('reset-confirm-pw').value;
  const errorEl = document.getElementById('reset-error');
  errorEl.style.display = 'none';
  if (!newPw || newPw.length < 8) {
    errorEl.textContent = '8文字以上のパスワードを入力してください';
    errorEl.style.display = 'block';
    return;
  }
  if (newPw !== confirmPw) {
    errorEl.textContent = 'パスワードが一致しません';
    errorEl.style.display = 'block';
    return;
  }
  alert('パスワードを変更しました（実装予定）');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
